<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherBot V2 Dashboard</title>
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'SF Mono', 'Monaco', 'Courier New', monospace;
            background: #0a0a0a;
            color: #00ff41;
            padding: 20px;
        }
        
        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #00ff41;
            padding-bottom: 15px;
        }
        
        .header h1 {
            font-size: 28px;
            letter-spacing: 2px;
        }
        
        .header p {
            color: #666;
            font-size: 12px;
            margin-top: 5px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: #111;
            border: 1px solid #00ff41;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: bold;
        }
        
        .stat-label {
            font-size: 11px;
            color: #666;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .profit { color: #00ff41; }
        .loss { color: #ff4444; }
        
        .section {
            margin-bottom: 30px;
        }
        
        .section-title {
            font-size: 18px;
            margin-bottom: 15px;
            padding-bottom: 5px;
            border-bottom: 1px solid #333;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        
        th, td {
            border: 1px solid #333;
            padding: 10px;
            text-align: left;
        }
        
        th {
            background: #111;
            color: #00ff41;
        }
        
        .refresh-time {
            text-align: right;
            color: #666;
            font-size: 11px;
            margin-top: 10px;
        }
        
        .status-online {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #00ff41;
            border-radius: 50%;
            animation: pulse 2s infinite;
            margin-right: 8px;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
        
        .badge {
            background: #00ff41;
            color: #0a0a0a;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="dashboard">
    <div class="header">
        <h1>🌤️ WEATHERBOT V2 DASHBOARD</h1>
        <p>Real-time monitoring | Kelly Criterion | Stop Loss | SQLite</p>
    </div>
    
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-value" id="balance">$0</div>
            <div class="stat-label">Balance</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="wins">0</div>
            <div class="stat-label">Wins</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="losses">0</div>
            <div class="stat-label">Losses</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="winrate">0%</div>
            <div class="stat-label">Win Rate</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="totalpnl">$0</div>
            <div class="stat-label">Total PnL</div>
        </div>
    </div>
    
    <div class="section">
        <div class="section-title">
            <span class="status-online"></span> OPEN POSITIONS
        </div>
        <div style="overflow-x: auto;">
            <table id="positions-table">
                <thead>
                    <tr><th>Market</th><th>Entry</th><th>Current</th><th>Shares</th><th>PnL</th><th>Stop Loss</th> </tr>
                </thead>
                <tbody id="positions-body">
                    <tr><td colspan="6" style="text-align: center;">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <div class="section">
        <div class="section-title">📈 PERFORMANCE CHART</div>
        <canvas id="pnl-chart" height="200" style="background: #111; border-radius: 8px;"></canvas>
    </div>
    
    <div class="refresh-time" id="timestamp">Waiting for data...</div>
</div>

<script>
    const socket = io();
    let pnlChart = null;
    
    socket.on('connect', () => {
        console.log('Connected to dashboard');
        document.getElementById('timestamp').innerHTML = '🟢 Connected | ' + new Date().toLocaleString();
    });
    
    socket.on('disconnect', () => {
        document.getElementById('timestamp').innerHTML = '🔴 Disconnected | ' + new Date().toLocaleString();
    });
    
    socket.on('balance', (balance) => {
        document.getElementById('balance').innerHTML = '$' + balance.toFixed(2);
    });
    
    socket.on('stats', (stats) => {
        document.getElementById('wins').innerHTML = stats.wins;
        document.getElementById('losses').innerHTML = stats.losses;
        const total = stats.wins + stats.losses;
        const winrate = total > 0 ? (stats.wins / total * 100).toFixed(1) : 0;
        document.getElementById('winrate').innerHTML = winrate + '%';
    });
    
    socket.on('positions', async (positions) => {
        const tbody = document.getElementById('positions-body');
        tbody.innerHTML = '';
        
        let totalUnrealized = 0;
        
        // Fetch current prices for each position
        for (const pos of positions) {
            let currentPrice = pos.current_price || pos.entry_price;
            let pnl = (currentPrice - pos.entry_price) * pos.shares;
            totalUnrealized += pnl;
            
            const row = tbody.insertRow();
            row.insertCell(0).innerHTML = `<span class="badge">${pos.location?.toUpperCase() || '??'}</span> ${pos.question?.slice(0, 50) || 'Unknown'}...`;
            row.insertCell(1).innerHTML = '$' + pos.entry_price.toFixed(4);
            row.insertCell(2).innerHTML = '$' + currentPrice.toFixed(4);
            row.insertCell(3).innerHTML = pos.shares.toFixed(1);
            row.insertCell(4).innerHTML = `<span class="${pnl >= 0 ? 'profit' : 'loss'}">${pnl >= 0 ? '+' : ''}$${pnl.toFixed(2)}</span>`;
            row.insertCell(5).innerHTML = '$' + (pos.entry_price * 0.8).toFixed(4);
        }
        
        if (positions.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">No open positions</td></tr>';
        }
        
        document.getElementById('totalpnl').innerHTML = `${totalUnrealized >= 0 ? '+' : ''}$${totalUnrealized.toFixed(2)}`;
        document.getElementById('totalpnl').style.color = totalUnrealized >= 0 ? '#00ff41' : '#ff4444';
        
        document.getElementById('timestamp').innerHTML = '🟢 Live | Updated: ' + new Date().toLocaleString();
    });
    
    // Load chart data
    async function loadChart() {
        try {
            const res = await fetch('/api/stats');
            const data = await res.json();
            
            if (data.dailyPnl && data.dailyPnl.length > 0 && pnlChart) {
                const dates = data.dailyPnl.map(d => d.date);
                const pnls = data.dailyPnl.map(d => d.pnl);
                pnlChart.data.labels = dates.reverse();
                pnlChart.data.datasets[0].data = pnls.reverse();
                pnlChart.update();
            }
        } catch (e) {
            console.error('Chart error:', e);
        }
    }
    
    // Initialize chart
    const ctx = document.getElementById('pnl-chart')?.getContext('2d');
    if (ctx) {
        pnlChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: [],
                datasets: [{
                    label: 'Daily PnL ($)',
                    data: [],
                    backgroundColor: (context) => {
                        const value = context.raw;
                        return value >= 0 ? '#00ff4133' : '#ff444433';
                    },
                    borderColor: (context) => {
                        const value = context.raw;
                        return value >= 0 ? '#00ff41' : '#ff4444';
                    },
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    legend: { labels: { color: '#00ff41' } }
                },
                scales: {
                    y: { grid: { color: '#333' }, ticks: { color: '#00ff41' } },
                    x: { grid: { color: '#333' }, ticks: { color: '#666', rotation: 45 } }
                }
            }
        });
        loadChart();
        setInterval(loadChart, 60000);
    }
</script>
</body>
</html>
